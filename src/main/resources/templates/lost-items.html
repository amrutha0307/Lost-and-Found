<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lost Items</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f1117;
            --surface: #191c27;
            --card: #1e2235;
            --border: #2a2f47;
            --accent: #e8a045;
            --accent-glow: rgba(232, 160, 69, 0.18);
            --text: #e8eaf2;
            --muted: #7c82a0;
            --input-bg: #13162080;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 48px 24px;
            background-image:
                    radial-gradient(ellipse 60% 40% at 70% 10%, rgba(232,160,69,0.07) 0%, transparent 70%),
                    radial-gradient(ellipse 40% 30% at 10% 80%, rgba(90,100,200,0.06) 0%, transparent 60%);
        }

        .page-wrapper {
            max-width: 760px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 48px;
        }

        /* ── Header ── */
        .page-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .page-header .icon {
            width: 44px; height: 44px;
            background: var(--accent-glow);
            border: 1px solid var(--accent);
            border-radius: 12px;
            display: grid; place-items: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .page-header p {
            font-size: 0.825rem;
            color: var(--muted);
            margin-top: 2px;
        }

        /* ── Cards ── */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            animation: fadeUp 0.45s ease both;
        }

        .card:nth-child(2) { animation-delay: 0.1s; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            color: var(--text);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            display: inline-block;
            width: 4px; height: 18px;
            background: var(--accent);
            border-radius: 4px;
        }

        /* ── Form ── */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full { grid-column: 1 / -1; }

        label {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
        }

        input[type="text"] {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        input[type="text"]::placeholder { color: var(--muted); }

        .form-footer {
            margin-top: 24px;
            display: flex;
            justify-content: flex-end;
        }

        button[type="submit"] {
            background: var(--accent);
            color: #0f1117;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            border: none;
            border-radius: 10px;
            padding: 12px 28px;
            cursor: pointer;
            transition: opacity 0.18s, transform 0.18s, box-shadow 0.18s;
            box-shadow: 0 4px 18px rgba(232,160,69,0.25);
        }

        button[type="submit"]:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(232,160,69,0.35);
        }

        button[type="submit"]:active { transform: translateY(0); }

        /* ── Table ── */
        .table-scroll { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        thead tr {
            background: rgba(232,160,69,0.08);
            border-bottom: 1px solid var(--border);
        }

        thead th {
            padding: 12px 16px;
            text-align: left;
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--accent);
            white-space: nowrap;
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }

        tbody tr:last-child { border-bottom: none; }

        tbody tr:hover { background: rgba(255,255,255,0.03); }

        tbody td {
            padding: 13px 16px;
            color: var(--text);
            vertical-align: middle;
        }

        tbody td:first-child {
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: 500;
        }

        /* Status badge */
        tbody td:nth-child(5) span,
        tbody td:nth-child(5) {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            background: rgba(232,160,69,0.12);
            color: var(--accent);
            border: 1px solid rgba(232,160,69,0.25);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--muted);
            font-size: 0.875rem;
        }
    </style>
</head>
<body>

<div class="page-wrapper">

    <!-- Header -->
    <div class="page-header">
        <div class="icon">🔍</div>
        <div>
            <h1>Lost &amp; Found</h1>
            <p>Track and manage reported lost items</p>
        </div>
    </div>

    <!-- Form Card -->
    <div class="card">
        <div class="card-title">Report Lost Item</div>

        <form action="/add-item" method="post">
            <div class="form-grid">
                <div class="form-group">
                    <label for="name">Item Name</label>
                    <input type="text" id="name" name="name" placeholder="e.g. Black Wallet">
                </div>
                <div class="form-group">
                    <label for="reportedBy">Reported By</label>
                    <input type="text" id="reportedBy" name="reportedBy" placeholder="Your name">
                </div>
                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" name="location" placeholder="Where was it lost?">
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description" placeholder="Brief description">
                </div>
            </div>

            <div class="form-footer">
                <button type="submit">Submit Report</button>
            </div>
        </form>
    </div>

    <!-- Table Card -->
    <div class="card">
        <div class="card-title">All Lost Items</div>

        <div class="table-scroll">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Location</th>
                    <th>Status</th>
                    <th>Reported By</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${items}">
                    <td th:text="${item.id}"></td>
                    <td th:text="${item.name}"></td>
                    <td th:text="${item.description}"></td>
                    <td th:text="${item.location}"></td>
                    <td th:text="${item.status}"></td>
                    <td th:text="${item.reportedBy}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
```
