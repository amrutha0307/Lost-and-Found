<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lost & Found Dashboard</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <main id="dashboardRoot" class="page-shell">
    <section class="dashboard-layout">
      <article class="dashboard-panel">
        <header class="dashboard-header">
          <div>
            <span class="eyebrow">Dashboard</span>
            <h1><span id="roleTitle">User</span> dashboard</h1>
            <p id="dashboardSubtitle" class="dashboard-subtitle"></p>
          </div>

          <div class="button-row">
            <span id="roleChip" class="role-chip">User</span>
            <button id="logoutButton" class="secondary-btn" type="button">Logout</button>
          </div>
        </header>

        <section id="actionGrid" class="card-grid" aria-label="Dashboard actions"></section>
      </article>
    </section>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
